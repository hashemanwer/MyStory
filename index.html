<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قصة حياتي</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        textarea { width: 100%; height: 200px; margin-top: 10px; padding: 10px; }
        #admin-panel, #story-content, #login-section, #denied-message { display: none; }
    </style>
    
    <!-- ربط مكتبات Firebase الأساسية -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ هنا ستضع إعدادات مشروعك من Firebase لاحقاً
        const firebaseConfig = {
  apiKey: "AIzaSyChl-6LNVY7pSbBEdPbucTjnm9vLJKU7xc",
  authDomain: "mystory-9601f.firebaseapp.com",
  projectId: "mystory-9601f",
  storageBucket: "mystory-9601f.firebasestorage.app",
  messagingSenderId: "270348211328",
  appId: "1:270348211328:web:3c0c3ef7a0a23e2a01c265"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // إيميل الأدمن (أنت)
        const ADMIN_EMAIL = "hashem.anwer.2003@gmail.com"; 

        // عناصر الصفحة
        const loginSection = document.getElementById('login-section');
        const storyContent = document.getElementById('story-content');
        const adminPanel = document.getElementById('admin-panel');
        const deniedMessage = document.getElementById('denied-message');
        const storyText = document.getElementById('story-text');
        const editor = document.getElementById('editor');

        // التحقق من حالة تسجيل الدخول
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginSection.style.display = 'none';
                
                // جلب القصة من قاعدة البيانات
                const storyDoc = await getDoc(doc(db, "content", "myStory"));
                if (storyDoc.exists()) {
                    storyText.innerText = storyDoc.data().text;
                    editor.value = storyDoc.data().text;
                }

                // التحقق مما إذا كان المستخدم هو الأدمن
                if (user.email === ADMIN_EMAIL) {
                    adminPanel.style.display = 'block';
                    storyContent.style.display = 'block';
                } else {
                    // التحقق مما إذا كان المستخدم مسموحاً له برؤية القصة
                    const userDoc = await getDoc(doc(db, "allowedUsers", user.email));
                    if (userDoc.exists() && userDoc.data().isAllowed === true) {
                        storyContent.style.display = 'block';
                    } else {
                        deniedMessage.style.display = 'block';
                    }
                }
            } else {
                loginSection.style.display = 'block';
                adminPanel.style.display = 'none';
                storyContent.style.display = 'none';
                deniedMessage.style.display = 'none';
            }
        });

        // دالة تسجيل الدخول
        window.login = () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, password)
                .catch(error => alert("خطأ في تسجيل الدخول: " + error.message));
        };

        // دالة تسجيل الخروج
        window.logout = () => {
            signOut(auth);
        };

        // دالة حفظ التعديلات (للأدمن فقط)
        window.saveStory = async () => {
            const newText = editor.value;
            await setDoc(doc(db, "content", "myStory"), { text: newText });
            storyText.innerText = newText;
            alert("تم حفظ القصة بنجاح!");
        };
    </script>
</head>
<body>

<div class="container">
    <h2>محطات من حياتي</h2>

    <!-- قسم تسجيل الدخول -->
    <div id="login-section" style="display: block;">
        <input type="email" id="email" placeholder="البريد الإلكتروني" required><br><br>
        <input type="password" id="password" placeholder="كلمة المرور" required><br><br>
        <button onclick="login()">تسجيل الدخول</button>
    </div>

    <!-- رسالة الرفض -->
    <div id="denied-message">
        <h3 style="color: red;">عذراً، لم يتم منحك صلاحية لقراءة القصة بعد.</h3>
        <button onclick="logout()">تسجيل خروج</button>
    </div>

    <!-- لوحة تحكم الأدمن -->
    <div id="admin-panel">
        <h3>لوحة تحكم (الأدمن)</h3>
        <textarea id="editor" placeholder="اكتب أو عدّل قصتك هنا..."></textarea><br>
        <button onclick="saveStory()">حفظ التعديلات</button>
        <hr>
    </div>

    <!-- عرض القصة -->
    <div id="story-content">
        <p id="story-text">جاري تحميل القصة...</p>
        <button onclick="logout()">تسجيل خروج</button>
    </div>
</div>

</body>
</html>
